<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nordic Labs</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #020617; }
    video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .overlay { position: fixed; inset: 0; background: linear-gradient(rgba(2,6,23,.45), rgba(2,6,23,.65)); }
    .content { position: relative; z-index: 2; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; padding: 24px; }
    h1 { font-size: clamp(48px, 9vw, 96px); margin: 0; letter-spacing: -0.06em; }
    p { max-width: 720px; font-size: clamp(18px, 2.2vw, 26px); line-height: 1.45; opacity: .9; margin: 24px 0 0; }
    .soon { margin-top: 40px; font-size: 14px; letter-spacing: .22em; text-transform: uppercase; opacity: .72; }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline>
    <source src="assets/nordiclabs-loop.mp4" type="video/mp4" />
  </video>

  <div class="overlay"></div>

  <main class="content">
    <h1>Nordic Labs</h1>
    <p>Building AI-powered health and fitness technologies for intelligent, personalized digital products.</p>
    <div class="soon">Coming Soon</div>
  </main>
</body>
</html>
